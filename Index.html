<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ETIOILUMINATI - Registration</title>
    <style>
        /* አጠቃላይ ገጽታ እና የጀርባ ቀለም */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #121212;
            color: #ffffff;
        }

        /* የባነር እና የከቨር ማቀፊያ */
        .header-container {
            width: 100%;
            max-width: 650px;
            margin: 0 auto;
            text-align: center;
            padding: 10px;
        }

        .banner-img {
            width: 100%;
            height: auto;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            object-fit: cover;
        }

        .page-cover {
            margin: 15px auto;
            width: 100%;
            height: 120px;
            border: 2px dashed #00ffcc;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            color: #00ffcc;
            background-color: #1e1e1e;
            font-weight: bold;
        }

        /* የፎርሙ ዋና ማቀፊያ ሳጥን */
        .form-container {
            max-width: 550px;
            margin: 20px auto;
            background: #1e1e1e;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.4);
            border-top: 4px solid #00ffcc;
        }

        .form-step {
            display: none;
        }

        .form-step.active {
            display: block;
        }

        h3 {
            color: #00ffcc;
            text-align: center;
            margin-top: 0;
            margin-bottom: 25px;
            font-size: 20px;
        }

        /* የፎርም መግቢያዎች ስታይል */
        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #cccccc;
        }

        input[type="text"],
        input[type="number"],
        input[type="tel"],
        select {
            width: 100%;
            padding: 12px;
            border: 1px solid #333;
            border-radius: 6px;
            background-color: #2a2a2a;
            color: #fff;
            font-size: 16px;
            box-sizing: border-box;
        }

        input[type="text"]:focus,
        input[type="number"]:focus,
        input[type="tel"]:focus,
        select:focus {
            border-color: #00ffcc;
            outline: none;
        }

        .file-label {
            font-size: 12px;
            color: #aaa;
            margin-top: 5px;
            display: block;
        }

        /* የባዮሜትሪክስ ስታይል (የፊት እና አሻራ) */
        .biometric-box {
            border: 1px solid #444;
            padding: 15px;
            border-radius: 8px;
            background: #252525;
            text-align: center;
            margin-bottom: 20px;
        }

        .bio-btn {
            background-color: #333;
            color: #00ffcc;
            border: 1px solid #00ffcc;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
            width: 100%;
            transition: 0.3s;
        }

        .bio-btn:hover {
            background-color: #00ffcc;
            color: #000;
        }

        .scan-status {
            font-size: 13px;
            margin-top: 8px;
            color: #ff3366;
            font-weight: bold;
        }

        /* የቁልፎች ስታይል */
        .btn-container {
            display: flex;
            justify-content: space-between;
            margin-top: 25px;
        }

        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-next {
            background-color: #00ffcc;
            color: #000;
            margin-left: auto;
        }

        .btn-next:hover {
            background-color: #00b38f;
        }

        .btn-prev {
            background-color: #444;
            color: #fff;
        }

        .btn-prev:hover {
            background-color: #555;
        }

        .btn-submit {
            background-color: #ff3366;
            color: #fff;
            margin-left: auto;
        }
    </style>
</head>
<body>

    <div class="header-container">
        <img src="1779494364720.png" alt="ETIOILUMINATI Banner" class="banner-img">
        
        <div class="page-cover">
            ETIOILUMINATI PAGE COVER
        </div>
    </div>

    <div class="form-container">
        <form id="regForm" onsubmit="return validateFinal(event)">
            
            <div class="form-step active" id="step-1">
                <h3>Page 1: መሰረታዊ መረጃ</h3>
                
                <div class="input-group">
                    <label for="fullName">Full Name (ሙሉ ስም) *</label>
                    <input type="text" id="fullName" placeholder="የእርስዎን ሙሉ ስም ያስገቡ" required>
                </div>

                <div class="input-group">
                    <label for="motherName">የናት ስም *</label>
                    <input type="text" id="motherName" placeholder="የእናትን ስም ያስገቡ" required>
                </div>
                
                <div class="input-group">
                    <label for="phone">ስልክ ቁጥር *</label>
                    <input type="tel" id="phone" placeholder="09... ወይም 07..." required>
                </div>

                <div class="input-group">
                    <label for="age">እድሜ *</label>
                    <input type="number" id="age" placeholder="እድሜ" required>
                </div>
                
                <div class="input-group">
                    <label for="gender">ጾታ *</label>
                    <select id="gender" required>
                        <option value="">ይምረጡ...</option>
                        <option value="ወንድ">ወንድ</option>
                        <option value="ሴት">ሴት</option>
                    </select>
                </div>

                <div class="input-group">
                    <label for="homeNumber">የቤት ቁጥር *</label>
                    <input type="text" id="homeNumber" placeholder="የቤት ቁጥር ያስገቡ" required>
                </div>

                <div class="btn-container">
                    <button type="button" class="btn btn-next" onclick="checkAndNext(1, 2)">Next</button>
                </div>
            </div>

            <div class="form-step" id="step-2">
                <h3>Page 2: ተጨማሪ መረጃዎች</h3>
                
                <div class="input-group">
                    <label for="education">ያለዎት የትምህርት ደረጃ *</label>
                    <select id="education" required>
                        <option value="">ይምረጡ...</option>
                        <option value="ዲፕሎማ">ዲፕሎማ</option>
                        <option value="ዲግሪ">መጀመሪያ ዲግሪ</option>
                        <option value="ማስተርስ">ማስተርስ</option>
                        <option value="ሌላ">ሌላ</option>
                    </select>
                </div>

                <div class="input-group">
                    <label for="bankSelect">የባንክ ምርጫ *</label>
                    <select id="bankSelect" required>
                        <option value="">የሚጠቀሙበትን ባንክ ይምረጡ...</option>
                        <option value="የኢትዮጵያ ንግድ ባንክ">የኢትዮጵያ ንግድ ባንክ (CBE)</option>
                        <option value="አዋሽ ባንክ">አዋሽ ባንክ</option>
                        <option value="አቢሲኒያ ባንክ">አቢሲኒያ ባንክ</option>
                        <option value="ቴሌብር">ቴሌብር (Telebirr)</option>
                    </select>
                </div>

                <div class="btn-container">
                    <button type="button" class="btn btn-prev" onclick="goToStep(1)">Back</button>
                    <button type="button" class="btn btn-next" onclick="checkAndNext(2, 3)">Next</button>
                </div>
            </div>

            <div class="form-step" id="step-3">
                <h3>Page 3: ባዮሜትሪክስ እና ሰነዶች</h3>
                
                <div class="biometric-box">
                    <label>የፊት ስካን (Face Scan) *</label>
                    <button type="button" class="bio-btn" id="faceBtn" onclick="simulateBio('face')">ካሜራ ክፈትና ስካን አድርግ</button>
                    <div class="scan-status" id="faceStatus">ያልተደረገ</div>
                </div>

                <div class="biometric-box">
                    <label>የእጅ አሻራ (Fingerprint) *</label>
                    <button type="button" class="bio-btn" id="fingerBtn" onclick="simulateBio('finger')">አሻራ አንባቢ ክፈት</button>
                    <div class="scan-status" id="fingerStatus">ያልተደረገ</div>
                </div>

                <div class="input-group">
                    <label for="idFront">የመታወቂያ ፊት (ID Front) *</label>
                    <input type="file" id="idFront" accept="image/*" required>
                    <span class="file-label">የመታወቂያዎን የፊተኛውን ክፍል ያያይዙ</span>
                </div>

                <div class="input-group">
                    <label for="idBack">የመታወቂያ ጀርባ (ID Back) *</label>
                    <input type="file" id="idBack" accept="image/*" required>
                    <span class="file-label">የመታወቂያዎን የጀርባውን ክፍል ያያይዙ</span>
                </div>

                <div class="input-group">
                    <label for="userPhoto">የራስዎ ፎቶ *</label>
                    <input type="file" id="userPhoto" accept="image/*" required>
                </div>

                <div class="btn-container">
                    <button type="button" class="btn btn-prev" onclick="goToStep(2)">Back</button>
                    <button type="submit" class="btn btn-submit">Submit</button>
                </div>
            </div>

        </form>
    </div>

    <script>
        // የባዮሜትሪክ ሁኔታዎችን መቆጣጠሪያ
        let isFaceScanned = false;
        let isFingerScanned = false;

        // የየገጹን ግዴታ መረጃዎች የመፈተሻ ተግባር
        function checkAndNext(currentStep, nextStep) {
            const currentStepDiv = document.getElementById('step-' + currentStep);
            const inputs = currentStepDiv.querySelectorAll('input[required], select[required]');
            let allValid = true;

            inputs.forEach(input => {
                if (!input.value) {
                    allValid = false;
                    input.reportValidity(); // ክፍት ቦታ ካለ ቀይ ምልክት ያሳያል
                }
            });

            if (allValid) {
                goToStep(nextStep);
            }
        }

        function goToStep(step) {
            document.querySelectorAll('.form-step').forEach(el => el.classList.remove('active'));
            document.getElementById('step-' + step).classList.add('active');
            window.scrollTo(0, 0);
        }

        // ባዮሜትሪክስን በጊዜያዊ አኒሜሽን የማስመስያ (Simulation)
        function simulateBio(type) {
            if (type === 'face') {
                const faceStatus = document.getElementById('faceStatus');
                faceStatus.innerText = "ስካን እያደረገ ነው... እባክዎ በትክክል ይዩ...";
                faceStatus.style.color = "#00ffcc";
                setTimeout(() => {
                    faceStatus.innerText = "የፊት ስካን ተጠናቋል! ✓";
                    isFaceScanned = true;
                }, 2500);
            } else if (type === 'finger') {
                const fingerStatus = document.getElementById('fingerStatus');
                fingerStatus.innerText = "አሻራ እየፈለገ ነው... ጣትዎን ያቆዩ...";
                fingerStatus.style.color = "#00ffcc";
                setTimeout(() => {
                    fingerStatus.innerText = "የእጅ አሻራ ተነስቷል! ✓";
                    isFingerScanned = true;
                }, 2500);
            }
        }

        // የመጨረሻውን ፎርም ከመላኩ በፊት ባዮሜትሪክስ መደረጉን መፈተሻ
        function validateFinal(event) {
            event.preventDefault();
            
            if (!isFaceScanned) {
                alert("እባክዎ መጀመሪያ የፊት ስካን ያድርጉ!");
                return false;
            }
            if (!isFingerScanned) {
                alert("እባክዎ መጀመሪያ የእጅ አሻራ ስካን ያድርጉ!");
                return false;
            }

            alert('ፎርሙ ሁሉንም መስፈርቶች አሟልቶ በተሳካ ሁኔታ ተልኳል!');
            return true;
        }
    </script>

</body>
</html>
